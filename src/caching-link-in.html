<script type="text/html" data-template-name="caching-link-in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-bookmark"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Channel topic">
    </div>
</script>

<script type="text/html" data-help-name="caching-link-in">
    <p>Receives messages from caching-link-out nodes that use the same topic and emits them to the flow.</p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('caching-link-in', {
        category: 'function',
        color: '#a6d6a6',
        defaults: {
            name: { value: '' },
            topic: { value: '' }
        },
        inputs: 0,
        outputs: 1,
        label: function () {
            return this.name || this.topic || 'caching-link-in';
        }
    });
</script>
