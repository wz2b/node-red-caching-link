<script type="text/html" data-template-name="caching-link-in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-bookmark"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Channel topic">
    </div>
</script>

<script type="text/html" data-help-name="caching-link-in">
    <p>
        Receives messages forwarded by <code>caching-link-out</code> nodes using the same exact topic,
        then emits them to the flow.
    </p>
    <p>
        Topic should be configured. A missing topic is shown as a node misconfiguration in status.
    </p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('caching-link-in', {
        category: 'common',
        color:"#d0d0d0",
        defaults: {
            name: { value: '' },
            topic: {
                value: '',
                validate: function (value) {
                    return typeof value === 'string' && value.trim().length > 0;
                }
            }
        },
        inputs: 0,
        outputs: 1,
        label: function () {
            return this.name || this.topic || 'caching-link-in';
        },
        icon: "link-out.svg"
    });
</script>
