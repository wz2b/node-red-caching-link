<script type="text/html" data-template-name="caching-link-get">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-bookmark"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Channel topic">
    </div>
</script>

<script type="text/html" data-help-name="caching-link-get">
    <p>
        On input, reads the retained message for the same exact topic and merges it onto the inbound
        message. Cached fields override inbound fields while preserving inbound <code>_msgid</code>.
    </p>
    <p>
        Sends nothing when no retained message exists. Topic is required at runtime.
    </p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('caching-link-get', {
        category: 'function',
        color: '#a6d6a6',
        defaults: {
            name: { value: '' },
            topic: {
                value: '',
                validate: function (value) {
                    return typeof value === 'string' && value.trim().length > 0;
                }
            }
        },
        inputs: 1,
        outputs: 1,
        label: function () {
            return this.name || this.topic || 'caching-link-get';
        }
    });
</script>
