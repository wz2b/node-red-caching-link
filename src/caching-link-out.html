<script type="text/html" data-template-name="caching-link-out">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-bookmark"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Channel topic">
    </div>
</script>

<script type="text/html" data-help-name="caching-link-out">
    <p>
        Sends incoming messages to all <code>caching-link-in</code> nodes with the same exact topic,
        and retains the latest message for that topic.
    </p>
    <p>
        Topic is required at runtime. When topic is missing, the node reports an invalid topic error.
    </p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('caching-link-out', {
        category: 'common',
        color: '#d0d0d0',
        defaults: {
            name: { value: '' },
            topic: {
                value: '',
                validate: function (value) {
                    return typeof value === 'string' && value.trim().length > 0;
                }
            }
        },
        inputs: 1,
        outputs: 0,
        label: function () {
            return this.name || this.topic || 'caching-link-out';
        },
        icon: "link-out.svg"
    });
</script>
